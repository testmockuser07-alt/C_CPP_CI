name: CI - Build, Test & Code Quality

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# Run every command inside the folder that has the Makefile and source code.
defaults:
  run:
    working-directory: 3_Implementation

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      # 1. Get the code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Install the tools we need
      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y gcc make cppcheck

      # 3. Build the application
      - name: Build
        run: make all

      # 4. Run the unit tests
      - name: Test
        run: make test

      # 5. Static code analysis (code quality)
      - name: Code quality (cppcheck)
        run: make cppcheck
