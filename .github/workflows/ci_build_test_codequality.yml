name: CI - Build, Test & Code Quality

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# Run every command inside the folder that has the Makefile and source code.
defaults:
  run:
    working-directory: 3_Implementation

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      # 1. Get the code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Install the tools we need
      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y gcc g++ make cppcheck gcovr

      # 3. Build the application
      - name: Build
        run: make all

      # 4. Run the unit tests
      - name: Test
        run: make test

      # 5. Static code analysis (code quality)
      - name: Code quality (cppcheck)
        run: make cppcheck

      # 6. Code coverage (build instrumented, run tests, generate report)
      - name: Code coverage
        run: make coverageCheck
          mkdir -p coverage
          gcovr -r . --exclude unity/ --exclude test/ \
            --html --html-details -o coverage/coverage.html \
            --print-summary

      # 7. Upload the coverage report so it can be downloaded from the run
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: 3_Implementation/coverage/
